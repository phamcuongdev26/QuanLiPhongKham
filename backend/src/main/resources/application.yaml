server:
  port: ${PORT:8080}

spring:
  application:
    name: clinic-system
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/clinic_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345678}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  web:
    resources:
      static-locations: file:frontend/,classpath:/static/
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:} root
    password: ${MAIL_PASSWORD:} 12345678
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

app:
  jwt:
    expiration-hours: 24
    private-key: classpath:certs/private.pem
    public-key: classpath:certs/public.pem
  password-reset:
    token-expiration-minutes: 30
