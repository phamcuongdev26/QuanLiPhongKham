services:
  db:
    image: mysql:8.0
    container_name: clinic_db
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: clinic_db
    ports:
      - "3306:3306"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p12345678"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: clinic_app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/clinic_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true&createDatabaseIfNotExist=true
      DB_USERNAME: root
      DB_PASSWORD: 12345678
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
