services:
  db:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME:-clinic}_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-12345678}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-clinic_db}
      TZ: Asia/Ho_Chi_Minh
      LANG: C.UTF-8
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  app:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-clinic}_app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      PORT: 8080
      DB_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-clinic_db}?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true&createDatabaseIfNotExist=true&connectionCollation=utf8mb4_unicode_ci
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-12345678}
      TZ: Asia/Ho_Chi_Minh
      LANG: C.UTF-8
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
