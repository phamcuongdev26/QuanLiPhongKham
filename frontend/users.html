<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý Người dùng - Phòng Khám</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Phòng Khám</div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">Xin chào, <strong id="sidebarUsername"></strong></div>
      <button class="btn btn-outline btn-sm btn-block" onclick="logout()">Đăng xuất</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <h2>Quản lý Người dùng</h2>
      <div class="topbar-right">
        <span class="badge" id="roleBadge"></span>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ Thêm người dùng</button>
      </div>
    </div>

    <div class="page-body">
      <div class="card">
        <div class="table-controls">
          <input type="text" class="search-input" id="searchInput" placeholder="Tìm theo username, email, họ tên..."
                 oninput="resetAndLoad()" />
          <select id="filterStatus" onchange="resetAndLoad()" style="padding:8px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:.9rem;">
            <option value="">Tất cả trạng thái</option>
            <option value="active">Hoạt động</option>
            <option value="inactive">Bị khóa</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Username</th>
                <th>Họ tên</th>
                <th>Email</th>
                <th>SĐT</th>
                <th>Trạng thái</th>
                <th>Ngày tạo</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody id="usersBody">
              <tr><td colspan="9" style="text-align:center;padding:32px;color:#999;">Đang tải...</td></tr>
            </tbody>
          </table>
        </div>
        <div id="emptyMsg" class="empty-state" style="display:none;">
          <p>Không tìm thấy người dùng nào</p>
        </div>
        <div class="pagination-wrap">
          <span class="pagination-info" id="paginationInfo"></span>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CREATE / EDIT -->
<div class="modal-overlay" id="userModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Thêm người dùng mới</h3>
      <button class="modal-close" onclick="closeModal()">Đóng</button>
    </div>
    <div class="modal-body">
      <div id="modalAlert" class="alert alert-error"></div>
      <form id="userForm">
        <div class="form-row">
          <div class="form-group">
            <label>Username *</label>
            <input type="text" id="f_username" placeholder="username" />
          </div>
          <div class="form-group">
            <label>Họ tên</label>
            <input type="text" id="f_fullName" placeholder="Nguyễn Văn A" />
          </div>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="f_email" placeholder="example@email.com" />
        </div>
        <div class="form-group">
          <label id="pwdLabel">Mật khẩu *</label>
          <input type="password" id="f_password" placeholder="Tối thiểu 6 ký tự" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Số điện thoại</label>
            <input type="text" id="f_phone" placeholder="0909xxxxxx" />
          </div>
          <div class="form-group" style="display:none;">
            <select id="f_role"><option value="PATIENT" selected>PATIENT</option></select>
          </div>
        </div>
        <div class="form-group">
          <label>Địa chỉ</label>
          <input type="text" id="f_address" placeholder="Địa chỉ..." />
        </div>
        <div class="form-group" id="activeGroup" style="display:none;">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" id="f_isActive" style="width:auto;" />
            Tài khoản đang hoạt động
          </label>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Hủy</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveUser()">Lưu</button>
    </div>
  </div>
</div>

<!-- CONFIRM DEACTIVATE -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>Xác nhận xóa</h3>
    <p id="confirmMsg">Bạn có chắc muốn xóa người dùng này không?</p>
    <div class="confirm-actions">
      <button class="btn btn-outline" onclick="closeConfirm()">Hủy</button>
      <button class="btn btn-danger" id="confirmOkBtn">xóa</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  const API = window.location.origin;
  const token = localStorage.getItem('token');
  const role = (localStorage.getItem('role') || '').trim().toUpperCase();
  if (!token || role !== 'ADMIN') window.location.href = 'login.html';

  let currentPage = 0;
  const PAGE_SIZE = 10;
  let currentPageUsers = [];
  let editingId = null;
  let _gotoPage = null;

  function authHeaders() {
    return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
  }
  function logout() { localStorage.clear(); window.location.href = 'login.html'; }

  function toast(msg, type = 'success') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast${type === 'error' ? ' error' : type === 'warning' ? ' warning' : ''}`;
    t.innerHTML = `${msg}`;
    c.appendChild(t); setTimeout(() => t.remove(), 3500);
  }

  function fmtDate(d) {
    if (!d) return '-';
    return new Date(d).toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric' });
  }

  function resetAndLoad() { currentPage = 0; loadUsers(); }

  async function loadUsers() {
    const q = document.getElementById('searchInput').value.trim();
    const status = document.getElementById('filterStatus').value;
    const params = new URLSearchParams({ page: currentPage, size: PAGE_SIZE });
    if (q) params.append('q', q);
    if (status) params.append('status', status);

    try {
      const res = await fetch(`${API}/api/admin/users?${params}`, { headers: authHeaders() });
      if (res.status === 401 || res.status === 403) { logout(); return; }
      const data = await res.json();
      const page = data.result || {};
      currentPageUsers = page.content || [];
      renderTable(currentPageUsers, page);
      renderPagination(page.page || 0, page.totalPages || 0, page.totalElements || 0, PAGE_SIZE, goToPage);
    } catch { toast('Lỗi tải danh sách người dùng', 'error'); }
  }

  function goToPage(p) { currentPage = p; loadUsers(); }

  function renderTable(users, page) {
    const tbody = document.getElementById('usersBody');
    const empty = document.getElementById('emptyMsg');
    if (users.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    const offset = (page.page || 0) * PAGE_SIZE;
    tbody.innerHTML = users.map((u, i) => `
      <tr>
        <td>${offset + i + 1}</td>
        <td><strong>${u.username}</strong></td>
        <td>${u.fullName || '-'}</td>
        <td>${u.email}</td>
        <td>${u.phoneNumber || '-'}</td>
        <td>
          <button class="btn ${u.isActive ? 'btn-success' : 'btn-warning'} btn-sm" onclick="toggleActive(${u.id})">${u.isActive ? 'Hoạt động' : 'Không hoạt động'}</button>
        </td>
        <td>${fmtDate(u.createdAt)}</td>
        <td>
          <div class="actions">
            <button class="btn btn-info btn-sm" onclick="openEditModal(${u.id})">Sửa</button>
            <button class="btn btn-danger btn-sm" onclick="confirmDelete(${u.id}, '${u.username}')" ${!u.isActive ? 'disabled' : ''}>Xóa</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function renderPagination(page, totalPages, totalElements, size, onPageChange) {
    _gotoPage = onPageChange;
    const el = document.getElementById('pagination');
    const infoEl = document.getElementById('paginationInfo');
    if (!el) return;
    const start = totalElements === 0 ? 0 : page * size + 1;
    const end = Math.min((page + 1) * size, totalElements);
    if (infoEl) infoEl.textContent = totalElements > 0 ? `Hiển thị ${start}–${end} / ${totalElements} bản ghi` : '';
    if (totalPages <= 1) { el.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="_gotoPage(0)" ${page===0?'disabled':''}>«</button>`;
    html += `<button class="page-btn" onclick="_gotoPage(${page-1})" ${page===0?'disabled':''}>‹</button>`;
    getPageRange(page, totalPages).forEach(p => {
      if (p === '...') html += `<button class="page-btn dots">…</button>`;
      else html += `<button class="page-btn ${p===page?'active':''}" onclick="_gotoPage(${p})">${p+1}</button>`;
    });
    html += `<button class="page-btn" onclick="_gotoPage(${page+1})" ${page>=totalPages-1?'disabled':''}>›</button>`;
    html += `<button class="page-btn" onclick="_gotoPage(${totalPages-1})" ${page>=totalPages-1?'disabled':''}>»</button>`;
    el.innerHTML = html;
  }

  function getPageRange(current, total) {
    if (total <= 7) return Array.from({length: total}, (_, i) => i);
    if (current <= 3) return [0,1,2,3,4,'...',total-1];
    if (current >= total-4) return [0,'...',total-5,total-4,total-3,total-2,total-1];
    return [0,'...',current-1,current,current+1,'...',total-1];
  }

  function openCreateModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'Thêm người dùng mới';
    document.getElementById('pwdLabel').textContent = 'Mật khẩu *';
    document.getElementById('f_password').placeholder = 'Tối thiểu 6 ký tự';
    document.getElementById('activeGroup').style.display = 'none';
    document.getElementById('userForm').reset();
    document.getElementById('modalAlert').className = 'alert';
    document.getElementById('userModal').classList.add('open');
  }

  function openEditModal(id) {
    const u = currentPageUsers.find(x => x.id === id);
    if (!u) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'Chỉnh sửa người dùng';
    document.getElementById('pwdLabel').textContent = 'Mật khẩu mới (để trống = không đổi)';
    document.getElementById('f_password').placeholder = 'Để trống nếu không thay đổi';
    document.getElementById('activeGroup').style.display = 'block';
    document.getElementById('f_username').value = u.username;
    document.getElementById('f_fullName').value = u.fullName || '';
    document.getElementById('f_email').value = u.email;
    document.getElementById('f_password').value = '';
    document.getElementById('f_phone').value = u.phoneNumber || '';
    document.getElementById('f_role').value = u.role;
    document.getElementById('f_address').value = u.address || '';
    document.getElementById('f_isActive').checked = u.isActive;
    document.getElementById('modalAlert').className = 'alert';
    document.getElementById('userModal').classList.add('open');
  }

  function closeModal() { document.getElementById('userModal').classList.remove('open'); editingId = null; }

  async function saveUser() {
    const alertEl = document.getElementById('modalAlert');
    alertEl.className = 'alert';
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';

    const body = {
      username: document.getElementById('f_username').value.trim(),
      email: document.getElementById('f_email').value.trim(),
      password: document.getElementById('f_password').value || null,
      fullName: document.getElementById('f_fullName').value.trim(),
      phoneNumber: document.getElementById('f_phone').value.trim(),
      address: document.getElementById('f_address').value.trim(),
      role: document.getElementById('f_role').value,
      isActive: editingId ? document.getElementById('f_isActive').checked : true
    };

    if (!body.username) { showModalError('Username không được để trống'); btn.disabled=false; btn.textContent='Lưu'; return; }
    if (!body.email) { showModalError('Email không được để trống'); btn.disabled=false; btn.textContent='Lưu'; return; }
    if (!editingId && !body.password) { showModalError('Mật khẩu không được để trống'); btn.disabled=false; btn.textContent='Lưu'; return; }

    try {
      const url = editingId ? `${API}/api/admin/users/${editingId}` : `${API}/api/admin/users`;
      const method = editingId ? 'PUT' : 'POST';
      const res = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Thao tác thất bại');
      toast(editingId ? 'Cập nhật người dùng thành công!' : 'Thêm người dùng thành công!');
      closeModal(); loadUsers();
    } catch (err) {
      showModalError(err.message);
    } finally { btn.disabled = false; btn.textContent = 'Lưu'; }
  }

  function showModalError(msg) {
    const el = document.getElementById('modalAlert');
    el.textContent = msg; el.className = 'alert alert-error show';
  }

  async function toggleActive(id) {
    try {
      const res = await fetch(`${API}/api/admin/users/${id}/toggle-active`, { method: 'PATCH', headers: authHeaders() });
      if (!res.ok) throw new Error('Thao tác thất bại');
      toast('Cập nhật trạng thái thành công!'); loadUsers();
    } catch (err) { toast(err.message, 'error'); }
  }

  let deleteTarget = null;
  function confirmDelete(id, uname) {
    deleteTarget = id;
    document.getElementById('confirmMsg').textContent = `Bạn có chắc muốn xóa người dùng "${uname}"?`;
    document.getElementById('confirmOverlay').classList.add('open');
  }
  function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('open'); deleteTarget = null; }
  document.getElementById('confirmOkBtn').onclick = async () => {
    if (!deleteTarget) return;
    try {
      const res = await fetch(`${API}/api/admin/users/${deleteTarget}/toggle-active`, { method: 'PATCH', headers: authHeaders() });
      if (!res.ok) throw new Error('Thao tác thất bại');
      toast('Đã xóa người dùng!'); closeConfirm(); loadUsers();
    } catch (err) { toast(err.message, 'error'); closeConfirm(); }
  };

  document.getElementById('userModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
  document.getElementById('confirmOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeConfirm(); });

  loadUsers();
</script>
<script src="sidebar.js"></script>
</body>
</html>
