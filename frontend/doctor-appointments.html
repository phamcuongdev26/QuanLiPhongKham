<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lịch hẹn - Bác sĩ</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .appt-row { display: grid; grid-template-columns: 100px 1fr 160px; gap: 16px; align-items: center; }
    .time-block { text-align: center; }
    .time-block .hour { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .time-block .ampm { font-size: .75rem; color: var(--text-light); }
    .patient-info h4 { font-size: .9rem; font-weight: 700; margin-bottom: 4px; }
    .patient-info p { font-size: .82rem; color: var(--text-light); }
    .status-badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: .75rem; font-weight: 700;
    }
    .status-PENDING { background: #fff8e1; color: #f39c12; }
    .status-CONFIRMED { background: #e8f4fd; color: #2980b9; }
    .status-COMPLETED { background: #eafaf1; color: #27ae60; }
    .status-CANCELED { background: #f0f0f0; color: #999; }
    .status-REJECTED { background: #fdecea; color: #e74c3c; }
    .tab-bar { padding: 0 28px; display: flex; gap: 4px; border-bottom: 2px solid var(--border); margin-bottom: 0; }
    .tab-btn {
      padding: 10px 20px; font-size: .9rem; font-weight: 600; cursor: pointer;
      border: none; background: none; color: var(--text-light);
      border-bottom: 2px solid transparent; margin-bottom: -2px;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    .date-picker-bar { padding: 14px 28px; display: flex; align-items: center; gap: 12px; }
    .date-picker-bar input { padding: 8px 12px; border: 1.5px solid var(--border); border-radius: var(--radius); font-size: .9rem; outline: none; }
    .date-picker-bar input:focus { border-color: var(--primary); }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Phòng khám</div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">Xin chào, <strong id="sidebarUsername"></strong></div>
      <button class="btn-logout" onclick="logout()">Đăng xuất</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <h2>Lịch hẹn</h2>
      <div class="topbar-right">
        <span class="badge" id="roleBadge"></span>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" id="tabUpcoming" onclick="switchTab('upcoming')">Sắp tới</button>
      <button class="tab-btn" id="tabByDate" onclick="switchTab('bydate')">Theo ngày</button>
    </div>

    <div id="byDateBar" style="display:none;">
      <div class="date-picker-bar">
        <label style="font-size:.9rem;font-weight:600;">Ngày:</label>
        <input type="date" id="pickDate" />
        <button class="btn btn-outline btn-sm" onclick="goToday()">Hôm nay</button>
      </div>
    </div>

    <div style="padding: 0 28px 28px;" id="listContainer">
      <div style="text-align:center;padding:48px;color:#999;">Đang tải...</div>
    </div>
  </div>
</div>

<!-- Modal cập nhật trạng thái -->
<div class="modal-overlay" id="statusModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Cập nhật lịch hẹn</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Trạng thái</label>
        <select id="statusSelect">
          <option value="CONFIRMED">Xác nhận</option>
          <option value="REJECTED">Từ chối</option>
        </select>
      </div>
      <div class="form-group">
        <label>Ghi chú bác sĩ</label>
        <textarea id="doctorNote" style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.9rem;resize:vertical;min-height:80px;outline:none;font-family:inherit;" placeholder="Ghi chú, chẩn đoán sơ bộ..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Hủy</button>
      <button class="btn btn-primary" onclick="submitStatus()">Lưu</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  const API = 'http://localhost:8080';
  const token = localStorage.getItem('token');
  const role = localStorage.getItem('role');

  if (!token || role !== 'DOCTOR') window.location.href = 'login.html';

  function logout() { localStorage.clear(); window.location.href = 'login.html'; }
  function authHeaders() { return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }; }

  function toast(msg, type = 'success') {
    const tc = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast${type === 'error' ? ' error' : ''}`;
    t.innerHTML = `${msg}`;
    tc.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  function localDateInput(d = new Date()) {
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  }
  const today = localDateInput();
  document.getElementById('pickDate').value = today;
  document.getElementById('pickDate').addEventListener('change', () => { if (currentTab === 'bydate') loadByDate(); });

  function goToday() {
    document.getElementById('pickDate').value = today;
    loadByDate();
  }

  function pad(n) { return String(n).padStart(2, '0'); }
  function parseLocalDateTime(dt) {
    const [datePart, timePart = '00:00'] = String(dt).replace(' ', 'T').replace(/Z$/, '').split('T');
    const [year, month, day] = datePart.split('-').map(Number);
    const [hour = 0, minute = 0] = timePart.split(':').map(Number);
    return { year, month, day, hour, minute };
  }
  function fmtTime(dt) {
    const p = parseLocalDateTime(dt);
    return `${pad(p.hour)}:${pad(p.minute)}`;
  }
  function fmtDate(dt) {
    const p = parseLocalDateTime(dt);
    return `${pad(p.day)}/${pad(p.month)}/${p.year}`;
  }

  const STATUS_LABEL = {
    PENDING: 'Chờ xác nhận', CONFIRMED: 'Đã xác nhận',
    COMPLETED: 'Hoàn thành', CANCELED: 'Đã hủy', REJECTED: 'Từ chối'
  };

  let currentTab = 'upcoming';
  let currentApptId = null;

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabUpcoming').classList.toggle('active', tab === 'upcoming');
    document.getElementById('tabByDate').classList.toggle('active', tab === 'bydate');
    document.getElementById('byDateBar').style.display = tab === 'bydate' ? 'block' : 'none';
    if (tab === 'upcoming') loadUpcoming();
    else loadByDate();
  }

  function openModal(appt) {
    currentApptId = appt.id;
    document.getElementById('modalTitle').textContent = `Bệnh nhân: ${appt.patientName}`;
    document.getElementById('doctorNote').value = appt.doctorNote || '';
    document.getElementById('statusModal').classList.add('open');
  }

  function closeModal() {
    currentApptId = null;
    document.getElementById('statusModal').classList.remove('open');
  }

  async function submitStatus() {
    if (!currentApptId) return;
    const status = document.getElementById('statusSelect').value;
    const doctorNote = document.getElementById('doctorNote').value.trim() || null;
    try {
      const res = await fetch(`${API}/api/doctor/appointments/${currentApptId}/status`, {
        method: 'PATCH',
        headers: authHeaders(),
        body: JSON.stringify({ status, doctorNote })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Thất bại');
      toast('Cập nhật thành công');
      closeModal();
      if (status === 'COMPLETED') {
        setTimeout(() => window.location.href = `doctor-records.html?appointmentId=${currentApptId || data.id}`, 500);
      }
      if (currentTab === 'upcoming') loadUpcoming(); else loadByDate();
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  function renderTable(list, showDate = false) {
    const container = document.getElementById('listContainer');
    if (!list.length) {
      container.innerHTML = `<div class="empty-state"><p>Không có lịch hẹn nào</p></div>`;
      return;
    }
    container.innerHTML = `<div class="card">
      <div class="table-wrap"><table>
        <thead><tr>
          ${showDate ? '<th>Ngày</th>' : ''}
          <th>Giờ</th><th>Bệnh nhân</th><th>Chuyên khoa</th><th>Triệu chứng</th><th>Trạng thái</th><th>Thao tác</th>
        </tr></thead>
        <tbody>${list.map(a => `
          <tr>
            ${showDate ? `<td><strong>${fmtDate(a.startTime)}</strong></td>` : ''}
            <td><strong>${fmtTime(a.startTime)} – ${fmtTime(a.endTime)}</strong></td>
            <td>${a.patientName || '-'}</td>
            <td>${a.specialtyName || '-'}</td>
            <td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${a.symptomDescription || '-'}</td>
            <td><span class="status-badge status-${a.status}">${STATUS_LABEL[a.status] || a.status}</span></td>
            <td class="actions">
              ${a.status !== 'COMPLETED' && a.status !== 'CANCELED' && a.status !== 'REJECTED' ? `
                <button class="btn btn-info btn-sm" onclick='openModal(${JSON.stringify(a)})'>Cập nhật</button>
              ` : ''}
              <a href="doctor-records.html?appointmentId=${a.id}" class="btn btn-success btn-sm">Hồ sơ</a>
            </td>
          </tr>
        `).join('')}</tbody>
      </table></div>
    </div>`;
  }

  async function loadUpcoming() {
    const container = document.getElementById('listContainer');
    container.innerHTML = '<div style="text-align:center;padding:48px;color:#999;">Đang tải...</div>';
    try {
      const res = await fetch(`${API}/api/doctor/appointments/upcoming`, { headers: authHeaders() });
      if (res.status === 401) { logout(); return; }
      const list = await res.json();
      renderTable(list, true);
    } catch {
      container.innerHTML = '<div style="color:var(--danger);text-align:center;padding:40px;">Không thể tải dữ liệu</div>';
    }
  }

  async function loadByDate() {
    const date = document.getElementById('pickDate').value;
    const container = document.getElementById('listContainer');
    container.innerHTML = '<div style="text-align:center;padding:48px;color:#999;">Đang tải...</div>';
    try {
      const res = await fetch(`${API}/api/doctor/appointments/today?date=${date}`, { headers: authHeaders() });
      if (res.status === 401) { logout(); return; }
      const list = await res.json();
      renderTable(list, false);
    } catch {
      container.innerHTML = '<div style="color:var(--danger);text-align:center;padding:40px;">Không thể tải dữ liệu</div>';
    }
  }

  loadUpcoming();
</script>
<script src="sidebar.js"></script>
</body>
</html>
