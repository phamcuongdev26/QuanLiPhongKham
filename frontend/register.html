<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký - Phòng Khám</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>Phòng Khám</h1>
      <p>Tạo tài khoản mới</p>
    </div>
    <h2>Đăng ký</h2>

    <div id="alert" class="alert"></div>

    <form id="registerForm">
      <div class="form-row">
        <div class="form-group">
          <label>Username *</label>
          <input type="text" id="username" placeholder="Tối thiểu 3 ký tự" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Họ tên *</label>
          <input type="text" id="fullName" placeholder="Nguyễn Văn A" />
        </div>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="email" placeholder="example@email.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Mật khẩu *</label>
        <input type="password" id="password" placeholder="Tối thiểu 6 ký tự" autocomplete="new-password" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Số điện thoại</label>
          <input type="text" id="phoneNumber" placeholder="0909xxxxxx" />
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
        Tạo tài khoản
      </button>
    </form>

    <div class="auth-footer">
      Đã có tài khoản? <a href="login.html">Đăng nhập</a>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:8080';

  if (localStorage.getItem('token')) {
    window.location.href = 'dashboard.html';
  }

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const alertEl = document.getElementById('alert');
    alertEl.className = 'alert';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Đang xử lý...';

    const body = {
      username: document.getElementById('username').value.trim(),
      fullName: document.getElementById('fullName').value.trim(),
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
      phoneNumber: document.getElementById('phoneNumber').value.trim()
    };

    try {
      const res = await fetch(`${API}/api/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Đăng ký thất bại');

      alertEl.textContent = 'Đăng ký thành công! Đang chuyển hướng...';
      alertEl.className = 'alert alert-success show';
      setTimeout(() => { window.location.href = 'login.html'; }, 1500);
    } catch (err) {
      alertEl.textContent = err.message;
      alertEl.className = 'alert alert-error show';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Tạo tài khoản';
    }
  });
</script>
</body>
</html>
