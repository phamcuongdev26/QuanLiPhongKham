<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý Bác sĩ - Phòng Khám</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Phòng Khám</div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">Xin chào, <strong id="sidebarUsername"></strong></div>
      <button class="btn btn-outline btn-sm btn-block" onclick="logout()">&#x2192; Đăng xuất</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <h2>&#129657; Quản lý Bác sĩ</h2>
      <div class="topbar-right">
        <span class="badge" id="roleBadge"></span>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ Thêm bác sĩ</button>
      </div>
    </div>

    <div class="page-body">
      <div class="card">
        <div class="table-controls">
          <input type="text" class="search-input" id="searchInput" placeholder="&#128269; Tìm theo tên, email..."
                 oninput="filterTable()" />
          <select id="filterSpecialty" onchange="filterTable()" style="padding:8px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:.9rem;">
            <option value="">Tất cả chuyên khoa</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Họ tên</th>
                <th>Email</th>
                <th>Chức danh</th>
                <th>Chuyên khoa</th>
                <th>Phí khám</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody id="doctorsBody">
              <tr><td colspan="7" style="text-align:center;padding:32px;color:#999;">Đang tải...</td></tr>
            </tbody>
          </table>
        </div>
        <div id="emptyMsg" class="empty-state" style="display:none;">
          <div class="empty-icon">&#129657;</div>
          <p>Không tìm thấy bác sĩ nào</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CREATE / EDIT -->
<div class="modal-overlay" id="doctorModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Thêm bác sĩ mới</h3>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div id="modalAlert" class="alert"></div>
      <form id="doctorForm">
        <div class="form-row">
          <div class="form-group">
            <label>Username *</label>
            <input type="text" id="f_username" placeholder="bacsi.nguyenvan" />
          </div>
          <div class="form-group">
            <label>Họ tên *</label>
            <input type="text" id="f_fullName" placeholder="Nguyễn Văn A" />
          </div>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="f_email" placeholder="bacsi@phongkham.vn" />
        </div>
        <div class="form-group">
          <label id="pwdLabel">Mật khẩu *</label>
          <input type="password" id="f_password" placeholder="Tối thiểu 6 ký tự" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Số điện thoại</label>
            <input type="text" id="f_phone" placeholder="0909xxxxxx" />
          </div>
          <div class="form-group">
            <label>Chức danh</label>
            <input type="text" id="f_title" placeholder="Bác sĩ CKI, Thạc sĩ..." />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Chuyên khoa *</label>
            <select id="f_specialty" style="padding:8px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:.9rem;width:100%;">
              <option value="">-- Chọn chuyên khoa --</option>
            </select>
          </div>
          <div class="form-group">
            <label>Phí khám (VNĐ)</label>
            <input type="number" id="f_fee" placeholder="150000" min="0" />
          </div>
        </div>
        <div class="form-group">
          <label>Giới thiệu</label>
          <textarea id="f_bio" rows="3" placeholder="Kinh nghiệm, chuyên môn..." style="width:100%;padding:8px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:.9rem;resize:vertical;"></textarea>
        </div>
        <div class="form-group" id="activeGroup" style="display:none;">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" id="f_isActive" style="width:auto;" />
            Tài khoản đang hoạt động
          </label>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Hủy</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveDoctor()">Lưu</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">&#9888;</div>
    <h3>Xác nhận xóa</h3>
    <p id="confirmMsg">Bạn có chắc muốn xóa bác sĩ này không?</p>
    <div class="confirm-actions">
      <button class="btn btn-outline" onclick="closeConfirm()">Hủy</button>
      <button class="btn btn-danger" id="confirmOkBtn">Xóa</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  const API = 'http://localhost:8080';
  const token = localStorage.getItem('token');
  const role = localStorage.getItem('role');
  if (!token || role !== 'ADMIN') window.location.href = 'login.html';

  let allDoctors = [];
  let editingId = null;

  function authHeaders() {
    return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
  }
  function logout() { localStorage.clear(); window.location.href = 'login.html'; }

  function toast(msg, type = 'success') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast${type === 'error' ? ' error' : type === 'warning' ? ' warning' : ''}`;
    t.innerHTML = `<span>${type === 'success' ? '&#9989;' : type === 'error' ? '&#10060;' : '&#9888;'}</span> ${msg}`;
    c.appendChild(t); setTimeout(() => t.remove(), 3500);
  }

  function fmtFee(n) {
    if (!n) return '-';
    return new Intl.NumberFormat('vi-VN').format(n) + ' đ';
  }

  async function loadSpecialties() {
    try {
      const res = await fetch(`${API}/api/admin/specialties`, { headers: authHeaders() });
      const data = await res.json();
      const list = Array.isArray(data) ? data : data.result || [];
      const filterSel = document.getElementById('filterSpecialty');
      const formSel = document.getElementById('f_specialty');
      list.forEach(s => {
        filterSel.insertAdjacentHTML('beforeend', `<option value="${s.id}">${s.name}</option>`);
        formSel.insertAdjacentHTML('beforeend', `<option value="${s.id}">${s.name}</option>`);
      });
    } catch {}
  }

  async function loadDoctors() {
    try {
      const res = await fetch(`${API}/api/admin/doctors`, { headers: authHeaders() });
      if (res.status === 401 || res.status === 403) { logout(); return; }
      const data = await res.json();
      allDoctors = Array.isArray(data) ? data : data.result || [];
      filterTable();
    } catch { toast('Lỗi tải danh sách bác sĩ', 'error'); }
  }

  function filterTable() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const specId = document.getElementById('filterSpecialty').value;
    const filtered = allDoctors.filter(d => {
      const matchQ = !q || (d.fullName || '').toLowerCase().includes(q) || (d.email || '').toLowerCase().includes(q);
      const matchSpec = !specId || String(d.specialtyId) === specId;
      return matchQ && matchSpec;
    });
    renderTable(filtered);
  }

  function renderTable(doctors) {
    const tbody = document.getElementById('doctorsBody');
    const empty = document.getElementById('emptyMsg');
    if (doctors.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    tbody.innerHTML = doctors.map((d, i) => `
      <tr style="${!d.isActive ? 'opacity:.6;' : ''}">
        <td>${i + 1}</td>
        <td><strong>${d.fullName || '-'}</strong></td>
        <td>${d.email || '-'}</td>
        <td>${d.title || '-'}</td>
        <td>${d.specialtyName || '-'}</td>
        <td>${fmtFee(d.consultationFee)}</td>
        <td><span class="badge ${d.isActive ? 'badge-active' : 'badge-inactive'}">${d.isActive ? 'Hoạt động' : 'Đã xóa'}</span></td>
        <td>
          <div class="actions">
            <button class="btn btn-info btn-sm" onclick="openEditModal(${d.id})" title="Sửa">&#9998;</button>
            <button class="btn btn-danger btn-sm"
              onclick="confirmDelete(${d.id}, '${(d.fullName || '').replace(/'/g, '')}')"
              title="${d.isActive ? 'Xóa' : 'Đã xóa'}"
              ${!d.isActive ? 'disabled' : ''}>&#128465;</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function openCreateModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'Thêm bác sĩ mới';
    document.getElementById('pwdLabel').textContent = 'Mật khẩu *';
    document.getElementById('f_password').placeholder = 'Tối thiểu 6 ký tự';
    document.getElementById('f_username').disabled = false;
    document.getElementById('f_email').disabled = false;
    document.getElementById('activeGroup').style.display = 'none';
    document.getElementById('doctorForm').reset();
    document.getElementById('modalAlert').className = 'alert';
    document.getElementById('doctorModal').classList.add('open');
  }

  function openEditModal(id) {
    const d = allDoctors.find(x => x.id === id);
    if (!d) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'Chỉnh sửa bác sĩ';
    document.getElementById('pwdLabel').textContent = 'Mật khẩu mới (để trống = không đổi)';
    document.getElementById('f_password').placeholder = 'Để trống nếu không thay đổi';
    document.getElementById('f_username').value = d.username || '';
    document.getElementById('f_username').disabled = true;
    document.getElementById('f_fullName').value = d.fullName || '';
    document.getElementById('f_email').value = d.email || '';
    document.getElementById('f_email').disabled = true;
    document.getElementById('f_password').value = '';
    document.getElementById('f_phone').value = d.phoneNumber || '';
    document.getElementById('f_title').value = d.title || '';
    document.getElementById('f_specialty').value = d.specialtyId || '';
    document.getElementById('f_fee').value = d.consultationFee || '';
    document.getElementById('f_bio').value = d.bio || '';
    document.getElementById('f_isActive').checked = d.isActive !== false;
    document.getElementById('activeGroup').style.display = 'block';
    document.getElementById('modalAlert').className = 'alert';
    document.getElementById('doctorModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('doctorModal').classList.remove('open');
    editingId = null;
  }

  async function saveDoctor() {
    const alertEl = document.getElementById('modalAlert');
    alertEl.className = 'alert';
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';

    const fullName = document.getElementById('f_fullName').value.trim();
    const email = document.getElementById('f_email').value.trim();
    const username = document.getElementById('f_username').value.trim();
    const password = document.getElementById('f_password').value;
    const specialtyId = document.getElementById('f_specialty').value;
    const fee = document.getElementById('f_fee').value;

    if (!fullName) { showModalError('Họ tên không được để trống'); btn.disabled=false; btn.textContent='Lưu'; return; }
    if (!editingId && !email) { showModalError('Email không được để trống'); btn.disabled=false; btn.textContent='Lưu'; return; }
    if (!editingId && !username) { showModalError('Username không được để trống'); btn.disabled=false; btn.textContent='Lưu'; return; }
    if (!editingId && !password) { showModalError('Mật khẩu không được để trống'); btn.disabled=false; btn.textContent='Lưu'; return; }
    if (!specialtyId) { showModalError('Vui lòng chọn chuyên khoa'); btn.disabled=false; btn.textContent='Lưu'; return; }

    try {
      let body, url, method;
      if (editingId) {
        body = {
          fullName,
          phoneNumber: document.getElementById('f_phone').value.trim() || null,
          specialtyId: Number(specialtyId),
          title: document.getElementById('f_title').value.trim() || null,
          bio: document.getElementById('f_bio').value.trim() || null,
          consultationFee: fee ? Number(fee) : null,
          isActive: document.getElementById('f_isActive').checked
        };
        url = `${API}/api/admin/doctors/${editingId}`;
        method = 'PUT';
      } else {
        body = {
          username,
          email,
          password,
          fullName,
          phoneNumber: document.getElementById('f_phone').value.trim() || null,
          specialtyId: Number(specialtyId),
          title: document.getElementById('f_title').value.trim() || null,
          bio: document.getElementById('f_bio').value.trim() || null,
          consultationFee: fee ? Number(fee) : null
        };
        url = `${API}/api/admin/doctors`;
        method = 'POST';
      }

      const res = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Thao tác thất bại');
      toast(editingId ? 'Cập nhật bác sĩ thành công!' : 'Thêm bác sĩ thành công!');
      closeModal(); loadDoctors();
    } catch (err) {
      showModalError(err.message);
    } finally { btn.disabled = false; btn.textContent = 'Lưu'; }
  }

  function showModalError(msg) {
    const el = document.getElementById('modalAlert');
    el.textContent = msg; el.className = 'alert alert-error show';
  }

  let deleteTarget = null;
  function confirmDelete(id, name) {
    deleteTarget = id;
    document.getElementById('confirmMsg').textContent = `Bạn có chắc muốn xóa bác sĩ "${name}"?`;
    document.getElementById('confirmOverlay').classList.add('open');
  }
  function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('open'); deleteTarget = null; }
  document.getElementById('confirmOkBtn').onclick = async () => {
    if (!deleteTarget) return;
    try {
      const res = await fetch(`${API}/api/admin/doctors/${deleteTarget}`, { method: 'DELETE', headers: authHeaders() });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Xóa thất bại');
      toast('Xóa bác sĩ thành công!'); closeConfirm(); loadDoctors();
    } catch (err) { toast(err.message, 'error'); closeConfirm(); }
  };

  document.getElementById('doctorModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
  document.getElementById('confirmOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeConfirm(); });

  loadSpecialties();
  loadDoctors();
</script>
<script src="sidebar.js"></script>
</body>
</html>
