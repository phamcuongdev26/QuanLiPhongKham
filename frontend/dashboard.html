<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Phòng Khám</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">Phòng Khám</div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">Xin chào, <strong id="sidebarUsername"></strong></div>
      <button class="btn btn-outline btn-sm btn-block" onclick="logout()">&#x2192; Đăng xuất</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <div class="topbar">
      <h2>Dashboard</h2>
      <div class="topbar-right">
        <span class="badge" id="roleBadge"></span>
      </div>
    </div>

    <div class="page-body">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">&#128197;</div>
          <div class="stat-info">
            <h3 id="totalAppointments">--</h3>
            <p>Tổng lịch hẹn</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">&#9203;</div>
          <div class="stat-info">
            <h3 id="pendingAppointments">--</h3>
            <p>Chờ xác nhận</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">&#9989;</div>
          <div class="stat-info">
            <h3 id="completedAppointments">--</h3>
            <p>Hoàn thành</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">&#129657;</div>
          <div class="stat-info">
            <h3 id="totalDoctors">--</h3>
            <p>Bác sĩ</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">&#128100;</div>
          <div class="stat-info">
            <h3 id="totalPatients">--</h3>
            <p>Bệnh nhân</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">&#128181;</div>
          <div class="stat-info">
            <h3 id="revenue">--</h3>
            <p>Doanh thu</p>
          </div>
        </div>
      </div>

      <div class="card" style="margin-bottom:20px;">
        <div class="card-header"><h3>&#127942; Bác sĩ bận nhất</h3></div>
        <div style="padding:16px 24px;" id="busiestDoctor">--</div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>&#128203; Lịch hẹn gần đây</h3>
          <a href="appointments-admin.html" class="btn btn-primary btn-sm">Xem tất cả</a>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Bệnh nhân</th>
                <th>Bác sĩ</th>
                <th>Chuyên khoa</th>
                <th>Thời gian</th>
                <th>Trạng thái</th>
              </tr>
            </thead>
            <tbody id="recentAppointmentsBody">
              <tr><td colspan="6" style="text-align:center;padding:24px;color:#999;">Đang tải...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const API = `http://${window.location.hostname}:8080`;
  const token = localStorage.getItem('token');
  const role = localStorage.getItem('role');
  const username = localStorage.getItem('username');

  if (!token || role !== 'ADMIN') window.location.href = 'login.html';

  function logout() { localStorage.clear(); window.location.href = 'login.html'; }
  function authHeaders() { return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }; }

  function fmtDate(d) {
    if (!d) return '-';
    return new Date(d).toLocaleString('vi-VN');
  }

  function fmtMoney(n) {
    if (!n) return '0 đ';
    return new Intl.NumberFormat('vi-VN').format(n) + ' đ';
  }

  const STATUS_LABEL = {
    PENDING: 'Chờ xác nhận', CONFIRMED: 'Đã xác nhận',
    COMPLETED: 'Hoàn thành', REJECTED: 'Từ chối', CANCELED: 'Đã hủy'
  };
  const STATUS_CLASS = {
    PENDING: 'badge-warning', CONFIRMED: 'badge-info',
    COMPLETED: 'badge-active', REJECTED: 'badge-inactive', CANCELED: 'badge-inactive'
  };

  async function loadDashboard() {
    try {
      const statsRes = await fetch(`${API}/api/admin/stats`, { headers: authHeaders() });
      if (statsRes.status === 401 || statsRes.status === 403) { logout(); return; }
      const statsData = await statsRes.json();
      const s = statsData.result || {};
      document.getElementById('totalAppointments').textContent = s.totalAppointments ?? '--';
      document.getElementById('pendingAppointments').textContent = s.pendingAppointments ?? '--';
      document.getElementById('completedAppointments').textContent = s.completedAppointments ?? '--';
      document.getElementById('totalDoctors').textContent = s.totalDoctors ?? '--';
      document.getElementById('totalPatients').textContent = s.totalPatients ?? '--';
      document.getElementById('revenue').textContent = fmtMoney(s.revenue);

      const bd = document.getElementById('busiestDoctor');
      if (s.busiestDoctor) {
        bd.innerHTML = `<strong>${s.busiestDoctor.fullName || '-'}</strong>
          <span style="color:var(--text-light);font-size:.85rem;margin-left:10px;">${s.busiestDoctor.specialty || ''} &bull; ${s.busiestDoctor.email || ''}</span>`;
      } else {
        bd.textContent = 'Chưa có dữ liệu';
      }

      const apptRes = await fetch(`${API}/api/admin/appointments`, { headers: authHeaders() });
      const appts = await apptRes.json();
      const list = (Array.isArray(appts) ? appts : appts.result || [])
        .sort((a, b) => new Date(b.startTime) - new Date(a.startTime)).slice(0, 10);
      const tbody = document.getElementById('recentAppointmentsBody');
      if (list.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Chưa có dữ liệu</td></tr>';
        return;
      }
      tbody.innerHTML = list.map((a, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${a.patientName || '-'}</td>
          <td>${a.doctorName || '-'}</td>
          <td>${a.specialtyName || '-'}</td>
          <td>${fmtDate(a.startTime)}</td>
          <td><span class="badge ${STATUS_CLASS[a.status] || ''}">${STATUS_LABEL[a.status] || a.status}</span></td>
        </tr>
      `).join('');
    } catch (err) {
      console.error(err);
    }
  }

  loadDashboard();
</script>
<script src="sidebar.js"></script>
</body>
</html>
