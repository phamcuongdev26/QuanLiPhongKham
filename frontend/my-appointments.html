<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lịch khám của tôi - Phòng khám</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .appt-card {
      background: var(--white); border-radius: 12px; padding: 20px 24px;
      box-shadow: var(--shadow); margin-bottom: 14px;
      display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: center;
      border-left: 4px solid var(--border);
    }
    .appt-card.PENDING { border-left-color: var(--warning); }
    .appt-card.CONFIRMED { border-left-color: var(--info); }
    .appt-card.COMPLETED { border-left-color: var(--success); }
    .appt-card.CANCELED { border-left-color: #ccc; opacity: .7; }
    .appt-card.REJECTED { border-left-color: var(--danger); opacity: .8; }
    .appt-info h4 { font-size: .95rem; font-weight: 700; margin-bottom: 6px; }
    .appt-meta { display: flex; gap: 16px; flex-wrap: wrap; }
    .appt-meta span { font-size: .82rem; color: var(--text-light); }
    .appt-meta span strong { color: var(--text); }
    .status-badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: .75rem; font-weight: 700;
    }
    .status-PENDING { background: #fff8e1; color: #f39c12; }
    .status-CONFIRMED { background: #e8f4fd; color: #2980b9; }
    .status-COMPLETED { background: #eafaf1; color: #27ae60; }
    .status-CANCELED { background: #f0f0f0; color: #999; }
    .status-REJECTED { background: #fdecea; color: #e74c3c; }
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 28px 0; margin-bottom: 20px; margin-top: 8px; }
    .filter-btn {
      padding: 6px 14px; border: 1.5px solid var(--border); border-radius: 20px;
      background: var(--white); cursor: pointer; font-size: .82rem; font-weight: 600;
      color: var(--text-light); transition: all .15s;
    }
    .filter-btn.active, .filter-btn:hover { border-color: var(--primary); color: var(--primary); background: #fef9f8; }
    .history-entry { border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
    .history-entry h4 { font-size: .92rem; margin-bottom: 6px; }
    .history-meta { display: flex; gap: 12px; flex-wrap: wrap; color: var(--text-light); font-size: .8rem; margin-bottom: 10px; }
    .history-section-title { font-size: .84rem; font-weight: 700; margin: 10px 0 6px; }
    .medicine-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .medicine-table th, .medicine-table td { padding: 8px; border-bottom: 1px solid var(--border); text-align: left; font-size: .82rem; }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Phòng khám</div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">Xin chào, <strong id="sidebarUsername"></strong></div>
      <button class="btn btn-outline btn-sm btn-block" onclick="logout()">Đăng xuất</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <h2>Lịch khám của tôi</h2>
      <div class="topbar-right">
        <span class="badge" id="roleBadge"></span>
        <a href="specialties.html" class="btn btn-primary btn-sm">+ Đặt lịch mới</a>
        <div style="position:relative;" id="notifWrapper">
          <button class="notif-bell-btn" id="notifBell" onclick="toggleNotifDropdown(event)">Thông báo<span class="notif-badge" id="notifBadge"></span></button>
          <div class="notif-dropdown" id="notifDropdown">
            <div class="notif-dropdown-header">
              <span>Thông báo</span>
              <button class="btn btn-outline btn-sm" onclick="markAllRead()">Đọc tất cả</button>
            </div>
            <div class="notif-list" id="notifList"><div class="notif-empty">Đang tải...</div></div>
          </div>
        </div>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('ALL', this)">Tất cả</button>
      <button class="filter-btn" onclick="setFilter('PENDING', this)">Chờ xác nhận</button>
      <button class="filter-btn" onclick="setFilter('CONFIRMED', this)">Đã xác nhận</button>
      <button class="filter-btn" onclick="setFilter('COMPLETED', this)">Hoàn thành</button>
      <button class="filter-btn" onclick="setFilter('CANCELED', this)">Đã hủy</button>
    </div>

    <div style="padding: 0 28px 28px;" id="listContainer">
      <div style="text-align:center;padding:48px;color:#999;">Đang tải...</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="historyModal">
  <div class="modal" style="max-width:900px;">
    <div class="modal-header">
      <h3>Lịch sử khám và đơn thuốc</h3>
      <button class="modal-close" onclick="closeHistoryModal()">Đóng</button>
    </div>
    <div class="modal-body" id="historyBody">
      <div style="text-align:center;padding:24px;color:#999;">Đang tải...</div>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>Hủy lịch hẹn?</h3>
    <p>Bạn có chắc muốn hủy lịch hẹn này không?</p>
    <div class="confirm-actions">
      <button class="btn btn-outline" onclick="closeConfirm()">Quay lại</button>
      <button class="btn btn-danger" id="confirmYes">Hủy lịch</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  const API = window.location.origin;
  const token = localStorage.getItem('token');
  const role = (localStorage.getItem('role') || '').trim().toUpperCase();
  const username = localStorage.getItem('username');
  const userId = localStorage.getItem('userId');

  if (!token || role !== 'PATIENT') window.location.href = 'login.html';

  function logout() { localStorage.clear(); window.location.href = 'login.html'; }

  let allAppointments = [];
  let currentFilter = 'ALL';

  function toast(msg, type = 'success') {
    const tc = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast${type === 'error' ? ' error' : ''}`;
    t.innerHTML = `${msg}`;
    tc.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  function fmtDateTime(dt) {
    if (!dt) return '-';
    const d = new Date(dt);
    return d.toLocaleDateString('vi-VN', {weekday:'short', day:'2-digit', month:'2-digit', year:'numeric'})
      + ' ' + d.toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'});
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
    }[ch]));
  }

  const STATUS_LABEL = {
    PENDING: 'Chờ xác nhận', CONFIRMED: 'Đã xác nhận',
    COMPLETED: 'Hoàn thành', CANCELED: 'Đã hủy', REJECTED: 'Bị từ chối'
  };

  function render(list) {
    const container = document.getElementById('listContainer');
    const filtered = currentFilter === 'ALL' ? list : list.filter(a => a.status === currentFilter);
    if (!filtered.length) {
      container.innerHTML = `<div class="empty-state"><p>Không có lịch hẹn nào</p></div>`;
      return;
    }
    container.innerHTML = filtered.map(a => `
      <div class="appt-card ${a.status}">
        <div class="appt-info">
          <h4>BS. ${a.doctorName || '-'} &mdash; ${a.specialtyName || '-'}</h4>
          <div class="appt-meta">
            <span><strong>${fmtDateTime(a.startTime)}</strong></span>
            ${a.symptomDescription ? `<span>${a.symptomDescription}</span>` : ''}
            ${a.doctorNote ? `<span>Ghi chú BS: ${a.doctorNote}</span>` : ''}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px;">
          <span class="status-badge status-${a.status}">${STATUS_LABEL[a.status] || a.status}</span>
          ${a.status === 'COMPLETED' ? `
            <button class="btn btn-info btn-sm" onclick="openHistoryModal(${a.id})">Hồ sơ/Đơn thuốc</button>
          ` : ''}
          ${(a.status === 'PENDING' || a.status === 'CONFIRMED') ? `
            <button class="btn btn-danger btn-sm" onclick="confirmCancel(${a.id})">Hủy lịch</button>
          ` : ''}
        </div>
      </div>
    `).join('');
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(allAppointments);
  }

  async function openHistoryModal(appointmentId) {
    const modal = document.getElementById('historyModal');
    const body = document.getElementById('historyBody');
    modal.classList.add('open');
    body.innerHTML = '<div style="text-align:center;padding:24px;color:#999;">Đang tải...</div>';
    try {
      const res = await fetch(`${API}/api/patients/${userId}/history`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.status === 401) { logout(); return; }
      const history = await res.json();
      if (!res.ok) throw new Error(history.message || 'Không thể tải lịch sử');
      renderHistory(history, appointmentId);
    } catch (err) {
      body.innerHTML = `<div style="color:var(--danger);padding:20px;">${escapeHtml(err.message)}</div>`;
    }
  }

  function closeHistoryModal() {
    document.getElementById('historyModal').classList.remove('open');
  }

  function renderHistory(history, appointmentId) {
    const body = document.getElementById('historyBody');
    const record = (Array.isArray(history) ? history : []).find(h =>
      Number(h.appointmentId) === Number(appointmentId) && h.status === 'COMPLETED'
    );
    if (!record) {
      body.innerHTML = '<div class="empty-state"><p>Lịch khám này chưa hoàn thành hoặc chưa có hồ sơ bệnh án.</p></div>';
      return;
    }
    body.innerHTML = [record].map(h => {
      const items = h.prescription?.items || [];
      return `
        <div class="history-entry">
          <h4>${escapeHtml(h.doctorName || '-')} - ${escapeHtml(h.specialtyName || '-')}</h4>
          <div class="history-meta">
            <span>${fmtDateTime(h.startTime)}</span>
            <span>${STATUS_LABEL[h.status] || h.status || '-'}</span>
          </div>
          <div class="history-section-title">Hồ sơ bệnh án</div>
          <div>Chẩn đoán: <strong>${escapeHtml(h.diagnosis || 'Chưa cập nhật')}</strong></div>
          <div>Ghi chú lâm sàng: ${escapeHtml(h.clinicalNote || 'Chưa cập nhật')}</div>
          <div class="history-section-title">Đơn thuốc</div>
          <div>Ghi chú: ${escapeHtml(h.prescription?.note || 'Không có')}</div>
          ${items.length ? `
            <table class="medicine-table">
              <thead><tr><th>Thuốc</th><th>Liều</th><th>Tần suất</th><th>Thời gian</th><th>Hướng dẫn</th></tr></thead>
              <tbody>${items.map(item => `
                <tr>
                  <td>${escapeHtml(item.drugName)}</td>
                  <td>${escapeHtml(item.dosage || '-')}</td>
                  <td>${escapeHtml(item.frequency || '-')}</td>
                  <td>${escapeHtml(item.duration || '-')}</td>
                  <td>${escapeHtml(item.instruction || '-')}</td>
                </tr>
              `).join('')}</tbody>
            </table>
          ` : '<div style="color:var(--text-light);font-size:.85rem;">Chưa có thuốc trong đơn.</div>'}
        </div>
      `;
    }).join('');
  }

  let pendingCancelId = null;
  function confirmCancel(id) {
    pendingCancelId = id;
    document.getElementById('confirmOverlay').classList.add('open');
  }
  function closeConfirm() {
    pendingCancelId = null;
    document.getElementById('confirmOverlay').classList.remove('open');
  }
  document.getElementById('confirmYes').onclick = async () => {
    if (!pendingCancelId) return;
    const appointmentId = pendingCancelId;
    closeConfirm();
    try {
      const res = await fetch(`${API}/api/appointments/${appointmentId}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) { const d = await res.json(); throw new Error(d.message || 'Thất bại'); }
      toast('Đã hủy lịch hẹn');
      loadAppointments();
    } catch (err) {
      toast(err.message, 'error');
    }
  };

  async function loadAppointments() {
    try {
      const res = await fetch(`${API}/api/appointments`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.status === 401) { logout(); return; }
      allAppointments = await res.json();
      render(allAppointments);
    } catch (err) {
      document.getElementById('listContainer').innerHTML = '<div style="color:var(--danger);text-align:center;padding:40px;">Không thể tải dữ liệu</div>';
    }
  }

  loadAppointments();

  // ── NOTIFICATIONS ──
  const NOTIF_API = `${API}/api/patient/notifications`;
  let _notifOpen = false;

  async function loadUnreadCount() {
    try {
      const res = await fetch(`${NOTIF_API}/unread-count`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) return;
      const data = await res.json();
      const count = data.result || 0;
      const badge = document.getElementById('notifBadge');
      badge.textContent = count > 99 ? '99+' : count;
      badge.style.display = count > 0 ? 'flex' : 'none';
    } catch {}
  }

  async function loadNotifications() {
    const listEl = document.getElementById('notifList');
    try {
      const res = await fetch(NOTIF_API, { headers: { 'Authorization': `Bearer ${token}` } });
      const notifs = await res.json();
      if (!Array.isArray(notifs) || !notifs.length) {
        listEl.innerHTML = '<div class="notif-empty">Không có thông báo nào</div>';
        return;
      }
      listEl.innerHTML = notifs.slice(0, 20).map(n => `
        <div class="notif-item${!n.read ? ' unread' : ''}" onclick="markRead(${n.id}, this)">
          <div class="notif-item-title">${n.title || ''}</div>
          <div class="notif-item-msg">${n.message || ''}</div>
          <div class="notif-item-time">${fmtRelativeTime(n.createdAt)}</div>
        </div>
      `).join('');
    } catch {
      listEl.innerHTML = '<div class="notif-empty">Không thể tải thông báo</div>';
    }
  }

  function fmtRelativeTime(dt) {
    if (!dt) return '';
    const diff = Math.floor((Date.now() - new Date(dt)) / 1000);
    if (diff < 60) return 'Vừa xong';
    if (diff < 3600) return `${Math.floor(diff / 60)} phút trước`;
    if (diff < 86400) return `${Math.floor(diff / 3600)} giờ trước`;
    return new Date(dt).toLocaleDateString('vi-VN');
  }

  function toggleNotifDropdown(e) {
    e.stopPropagation();
    _notifOpen = !_notifOpen;
    document.getElementById('notifDropdown').classList.toggle('open', _notifOpen);
    if (_notifOpen) loadNotifications();
  }

  async function markRead(id, el) {
    try {
      await fetch(`${NOTIF_API}/${id}/read`, { method: 'PATCH', headers: { 'Authorization': `Bearer ${token}` } });
      el.classList.remove('unread');
      loadUnreadCount();
    } catch {}
  }

  async function markAllRead() {
    try {
      await fetch(`${NOTIF_API}/read-all`, { method: 'PATCH', headers: { 'Authorization': `Bearer ${token}` } });
      document.querySelectorAll('.notif-item.unread').forEach(el => el.classList.remove('unread'));
      document.getElementById('notifBadge').style.display = 'none';
    } catch {}
  }

  document.addEventListener('click', e => {
    if (_notifOpen && !document.getElementById('notifWrapper').contains(e.target)) {
      _notifOpen = false;
      document.getElementById('notifDropdown').classList.remove('open');
    }
  });

  loadUnreadCount();
  setInterval(loadUnreadCount, 30000);
</script>
<script src="sidebar.js"></script>
</body>
</html>
