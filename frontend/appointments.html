<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lịch hẹn - Phòng Khám</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Phòng Khám</div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">Xin chào, <strong id="sidebarUsername"></strong></div>
      <button class="btn-logout" onclick="logout()">Đăng xuất</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <h2>Lịch hẹn</h2>
      <div class="topbar-right">
        <span class="badge" id="roleBadge"></span>
      </div>
    </div>

    <div class="page-body">
      <div class="card">
        <div class="table-controls">
          <input type="text" class="search-input" id="searchInput"
            placeholder="Tìm theo bệnh nhân, bác sĩ..." oninput="filterTable()" />
          <select id="filterStatus" onchange="filterTable()"
            style="padding:8px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:.9rem;">
            <option value="">Tất cả trạng thái</option>
            <option value="PENDING">Chờ xác nhận</option>
            <option value="CONFIRMED">Đã xác nhận</option>
            <option value="COMPLETED">Hoàn thành</option>
            <option value="REJECTED">Từ chối</option>
            <option value="CANCELED">Đã hủy</option>
          </select>
          <select id="filterSpecialty" onchange="filterTable()"
            style="padding:8px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:.9rem;">
            <option value="">Tất cả chuyên khoa</option>
          </select>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:44px;">#</th>
                <th>Bệnh nhân</th>
                <th>Bác sĩ</th>
                <th>Chuyên khoa</th>
                <th>Thời gian</th>
                <th>Lý do khám</th>
                <th style="width:120px;">Trạng thái</th>
              </tr>
            </thead>
            <tbody id="apptBody">
              <tr><td colspan="7" style="text-align:center;padding:40px;color:#999;">Đang tải...</td></tr>
            </tbody>
          </table>
        </div>

        <div id="emptyMsg" class="empty-state" style="display:none;">
          <p>Không tìm thấy lịch hẹn nào</p>
        </div>

        <div class="pagination-wrap">
          <span class="pagination-info" id="paginationInfo"></span>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  const API   = 'http://localhost:8080';
  const token = localStorage.getItem('token');
  const role  = localStorage.getItem('role');
  if (!token || role !== 'ADMIN') window.location.href = 'login.html';

  const PAGE_SIZE = 10;
  let currentPage = 0;
  let allAppts    = [];
  let filtered    = [];
  let _gotoPage   = null;

  const STATUS_LABEL = {
    PENDING:'Chờ xác nhận', CONFIRMED:'Đã xác nhận',
    COMPLETED:'Hoàn thành', REJECTED:'Từ chối', CANCELED:'Đã hủy'
  };
  const STATUS_CLASS = {
    PENDING:'badge-warning', CONFIRMED:'badge-info',
    COMPLETED:'badge-active', REJECTED:'badge-inactive', CANCELED:'badge-inactive'
  };

  function authHeaders() { return { 'Authorization':`Bearer ${token}`, 'Content-Type':'application/json' }; }
  function logout() { localStorage.clear(); window.location.href = 'login.html'; }

  function fmtDateTime(d) {
    if (!d) return '-';
    return new Date(d).toLocaleString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  async function loadData() {
    try {
      const res  = await fetch(`${API}/api/admin/appointments`, { headers: authHeaders() });
      if (res.status === 401 || res.status === 403) { logout(); return; }
      const data = await res.json();
      allAppts = Array.isArray(data) ? data : data.result || [];

      /* populate specialty filter */
      const specs = [...new Set(allAppts.map(a => a.specialtyName).filter(Boolean))].sort();
      const sel   = document.getElementById('filterSpecialty');
      specs.forEach(s => sel.insertAdjacentHTML('beforeend', `<option value="${s}">${s}</option>`));

      filterTable();
    } catch { toast('Lỗi tải dữ liệu', 'error'); }
  }

  function filterTable() {
    const q      = document.getElementById('searchInput').value.trim().toLowerCase();
    const status = document.getElementById('filterStatus').value;
    const spec   = document.getElementById('filterSpecialty').value;

    filtered = allAppts.filter(a => {
      const matchQ    = !q || (a.patientName||'').toLowerCase().includes(q) || (a.doctorName||'').toLowerCase().includes(q);
      const matchSt   = !status || a.status === status;
      const matchSpec = !spec   || a.specialtyName === spec;
      return matchQ && matchSt && matchSpec;
    });

    currentPage = 0;
    renderPage();
  }

  function renderPage() {
    const tbody = document.getElementById('apptBody');
    const empty = document.getElementById('emptyMsg');
    const total = filtered.length;
    const start = currentPage * PAGE_SIZE;
    const slice = filtered.slice(start, start + PAGE_SIZE);

    if (!total) { tbody.innerHTML = ''; empty.style.display = 'block'; renderPagination(0,0,0); return; }
    empty.style.display = 'none';

    tbody.innerHTML = slice.map((a, i) => `
      <tr>
        <td style="text-align:center;">${start + i + 1}</td>
        <td><strong>${a.patientName || '-'}</strong></td>
        <td>${a.doctorName || '-'}</td>
        <td>${a.specialtyName || '-'}</td>
        <td style="white-space:nowrap;font-size:.82rem;">${fmtDateTime(a.startTime)}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.82rem;color:#666;">
          ${a.symptomDescription || '<em style="color:#ccc;">—</em>'}
        </td>
        <td><span class="badge ${STATUS_CLASS[a.status]||''}">${STATUS_LABEL[a.status]||a.status}</span></td>
      </tr>
    `).join('');

    const totalPages = Math.ceil(total / PAGE_SIZE);
    renderPagination(currentPage, totalPages, total);
  }

  function renderPagination(page, totalPages, totalElements) {
    const el     = document.getElementById('pagination');
    const infoEl = document.getElementById('paginationInfo');
    const start  = totalElements === 0 ? 0 : page * PAGE_SIZE + 1;
    const end    = Math.min((page + 1) * PAGE_SIZE, totalElements);
    if (infoEl) infoEl.textContent = totalElements > 0 ? `Hiển thị ${start}–${end} / ${totalElements} lịch hẹn` : '';
    if (!el || totalPages <= 1) { if (el) el.innerHTML = ''; return; }

    _gotoPage = p => { currentPage = p; renderPage(); };
    let html = `<button class="page-btn" onclick="_gotoPage(0)" ${page===0?'disabled':''}>«</button>`;
    html += `<button class="page-btn" onclick="_gotoPage(${page-1})" ${page===0?'disabled':''}>‹</button>`;
    getPageRange(page, totalPages).forEach(p => {
      if (p === '...') html += `<button class="page-btn dots">…</button>`;
      else html += `<button class="page-btn ${p===page?'active':''}" onclick="_gotoPage(${p})">${p+1}</button>`;
    });
    html += `<button class="page-btn" onclick="_gotoPage(${page+1})" ${page>=totalPages-1?'disabled':''}>›</button>`;
    html += `<button class="page-btn" onclick="_gotoPage(${totalPages-1})" ${page>=totalPages-1?'disabled':''}>»</button>`;
    el.innerHTML = html;
  }

  function getPageRange(current, total) {
    if (total <= 7) return Array.from({length: total}, (_, i) => i);
    if (current <= 3) return [0,1,2,3,4,'...',total-1];
    if (current >= total-4) return [0,'...',total-5,total-4,total-3,total-2,total-1];
    return [0,'...',current-1,current,current+1,'...',total-1];
  }

  function toast(msg, type = 'success') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast${type === 'error' ? ' error' : ''}`;
    t.innerHTML = `<span>${type === 'success' ? '' : ''}</span> ${msg}`;
    c.appendChild(t); setTimeout(() => t.remove(), 3500);
  }

  loadData();
</script>
<script src="sidebar.js"></script>
</body>
</html>
