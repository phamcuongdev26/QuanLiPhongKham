<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đặt lịch khám - Phòng khám</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .booking-layout { display: grid; grid-template-columns: 300px 1fr; gap: 24px; padding: 28px; }
    .doctor-card {
      background: var(--white); border-radius: 12px; padding: 24px;
      box-shadow: var(--shadow); height: fit-content;
    }
    .doctor-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, #ee4d2d, #ff7849);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; color: white; font-weight: 700; margin-bottom: 14px;
    }
    .booking-form { background: var(--white); border-radius: 12px; padding: 24px; box-shadow: var(--shadow); }
    .slot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-top: 8px; }
    .slot-btn {
      padding: 8px 4px; border: 1.5px solid var(--border); border-radius: var(--radius);
      background: var(--white); cursor: pointer; font-size: .8rem; font-weight: 600;
      text-align: center; transition: all .15s;
    }
    .slot-btn:hover { border-color: var(--primary); color: var(--primary); }
    .slot-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }
    .slot-loading { text-align: center; padding: 20px; color: var(--text-light); font-size: .875rem; }
    .breadcrumb { padding: 16px 28px 0; font-size: .875rem; color: var(--text-light); }
    .breadcrumb a { color: var(--primary); text-decoration: none; }
    textarea { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius);
      font-size: .9rem; resize: vertical; min-height: 80px; outline: none; font-family: inherit; }
    textarea:focus { border-color: var(--primary); }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Phòng khám</div>
    <nav id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-info">Xin chào, <strong id="sidebarUsername"></strong></div>
      <button class="btn btn-outline btn-sm btn-block" onclick="logout()">&#x2192; Đăng xuất</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <h2>Đặt lịch khám</h2>
      <div class="topbar-right">
        <span class="badge" id="roleBadge"></span>
        <div style="position:relative;" id="notifWrapper">
          <button class="notif-bell-btn" id="notifBell" onclick="toggleNotifDropdown(event)">&#128276;<span class="notif-badge" id="notifBadge"></span></button>
          <div class="notif-dropdown" id="notifDropdown">
            <div class="notif-dropdown-header">
              <span>Thông báo</span>
              <button class="btn btn-outline btn-sm" onclick="markAllRead()">Đọc tất cả</button>
            </div>
            <div class="notif-list" id="notifList"><div class="notif-empty">Đang tải...</div></div>
          </div>
        </div>
      </div>
    </div>

    <div class="breadcrumb">
      <a href="specialties.html">Chuyên khoa</a> &rsaquo;
      <a id="breadDoctors" href="#">Bác sĩ</a> &rsaquo;
      Đặt lịch
    </div>

    <div class="booking-layout">
      <!-- Doctor Info -->
      <div class="doctor-card">
        <div class="doctor-avatar" id="doctorAvatar">?</div>
        <h3 id="doctorName" style="font-size:1rem;font-weight:700;margin-bottom:4px;"></h3>
        <div id="doctorTitle" style="font-size:.85rem;color:var(--text-light);margin-bottom:4px;"></div>
        <div id="doctorSpecialty" style="font-size:.85rem;color:var(--primary);font-weight:600;margin-bottom:8px;"></div>
        <div id="doctorBio" style="font-size:.82rem;color:var(--text-light);line-height:1.5;margin-bottom:12px;"></div>
        <div style="background:#f8fafc;border-radius:8px;padding:10px 14px;">
          <div style="font-size:.8rem;color:var(--text-light);">Phí khám</div>
          <div id="doctorFee" style="font-size:1rem;font-weight:700;color:var(--success);"></div>
        </div>
      </div>

      <!-- Booking Form -->
      <div class="booking-form">
        <div id="alert" class="alert"></div>

        <div class="form-group">
          <label>Chọn ngày khám</label>
          <input type="date" id="pickDate" style="max-width:220px;" />
        </div>

        <div class="form-group">
          <label>Chọn khung giờ</label>
          <div id="slotContainer" class="slot-loading">Vui lòng chọn ngày để xem khung giờ trống</div>
        </div>

        <div class="form-group">
          <label>Mô tả triệu chứng</label>
          <textarea id="symptoms" placeholder="Mô tả ngắn gọn tình trạng bệnh, triệu chứng..."></textarea>
        </div>

        <button class="btn btn-primary" id="submitBtn" onclick="submitBooking()" disabled>
          &#128197; Xác nhận đặt lịch
        </button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  const API = 'http://localhost:8080';
  const token = localStorage.getItem('token');
  const role = localStorage.getItem('role');
  const username = localStorage.getItem('username');

  if (!token || role !== 'PATIENT') window.location.href = 'login.html';

  function logout() { localStorage.clear(); window.location.href = 'login.html'; }

  const params = new URLSearchParams(location.search);
  const doctorId = params.get('doctorId');
  const specialtyId = params.get('specialtyId');
  const specialtyName = params.get('specialtyName') || '';

  if (!doctorId) window.location.href = 'specialties.html';

  const breadDoctors = document.getElementById('breadDoctors');
  breadDoctors.href = `doctors.html?specialtyId=${specialtyId}&specialtyName=${encodeURIComponent(specialtyName)}`;
  breadDoctors.textContent = specialtyName || 'Bác sĩ';

  function initials(name) {
    if (!name) return '?';
    const parts = name.trim().split(' ');
    return parts[parts.length - 1][0].toUpperCase();
  }

  function fmtFee(fee) {
    if (!fee) return 'Liên hệ';
    return new Intl.NumberFormat('vi-VN').format(fee) + ' đ';
  }

  function toast(msg, type = 'success') {
    const tc = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast${type === 'error' ? ' error' : ''}`;
    t.innerHTML = `<span>${type === 'success' ? '✅' : '❌'}</span> ${msg}`;
    tc.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  let selectedSlot = null;

  async function loadDoctor() {
    try {
      const res = await fetch(`${API}/api/doctors/${doctorId}`);
      const d = await res.json();
      document.getElementById('doctorAvatar').textContent = initials(d.fullName);
      document.getElementById('doctorName').textContent = d.fullName || '-';
      document.getElementById('doctorTitle').textContent = d.title || '';
      document.getElementById('doctorSpecialty').textContent = d.specialtyName || '';
      document.getElementById('doctorBio').textContent = d.bio || '';
      document.getElementById('doctorFee').textContent = fmtFee(d.consultationFee);
    } catch (err) {
      console.error(err);
    }
  }

  async function loadSlots(date) {
    selectedSlot = null;
    document.getElementById('submitBtn').disabled = true;
    const container = document.getElementById('slotContainer');
    container.className = 'slot-loading';
    container.textContent = 'Đang tải khung giờ...';
    try {
      const res = await fetch(`${API}/api/doctors/${doctorId}/slots?date=${date}&slotMinutes=30`);
      const slots = await res.json();
      container.className = '';
      if (!slots || slots.length === 0) {
        container.innerHTML = '<div style="color:var(--text-light);font-size:.875rem;">Không có khung giờ trống trong ngày này</div>';
        return;
      }
      container.innerHTML = `<div class="slot-grid">${slots.map((s, i) => {
        const start = new Date(s.startTime);
        const end = new Date(s.endTime);
        const label = `${pad(start.getHours())}:${pad(start.getMinutes())} - ${pad(end.getHours())}:${pad(end.getMinutes())}`;
        return `<button class="slot-btn" data-idx="${i}" data-start="${s.startTime}" data-end="${s.endTime}" onclick="selectSlot(this, '${s.startTime}', '${s.endTime}')">${label}</button>`;
      }).join('')}</div>`;
    } catch (err) {
      container.innerHTML = '<div style="color:var(--danger);font-size:.875rem;">Không thể tải khung giờ</div>';
    }
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function selectSlot(btn, start, end) {
    document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedSlot = { start, end };
    document.getElementById('submitBtn').disabled = false;
  }

  document.getElementById('pickDate').addEventListener('change', (e) => {
    if (e.target.value) loadSlots(e.target.value);
  });

  // Set min date to today
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('pickDate').min = today;

  async function submitBooking() {
    if (!selectedSlot) return;
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Đang đặt...';
    const alertEl = document.getElementById('alert');
    alertEl.className = 'alert';

    const body = {
      doctorId: Number(doctorId),
      specialtyId: specialtyId ? Number(specialtyId) : undefined,
      startTime: selectedSlot.start,
      endTime: selectedSlot.end,
      symptomDescription: document.getElementById('symptoms').value.trim() || null
    };

    try {
      const res = await fetch(`${API}/api/appointments`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Đặt lịch thất bại');
      toast('Đặt lịch thành công! Vui lòng chờ xác nhận từ bác sĩ.');
      setTimeout(() => window.location.href = 'my-appointments.html', 1800);
    } catch (err) {
      alertEl.textContent = err.message;
      alertEl.className = 'alert alert-error show';
      btn.disabled = false;
      btn.textContent = '📅 Xác nhận đặt lịch';
    }
  }

  loadDoctor();

  // ── NOTIFICATIONS ──
  const NOTIF_API = `${API}/api/patient/notifications`;
  let _notifOpen = false;
  async function loadUnreadCount() {
    try {
      const res = await fetch(`${NOTIF_API}/unread-count`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) return;
      const data = await res.json();
      const count = data.result || 0;
      const badge = document.getElementById('notifBadge');
      badge.textContent = count > 99 ? '99+' : count;
      badge.style.display = count > 0 ? 'flex' : 'none';
    } catch {}
  }
  async function loadNotifications() {
    const listEl = document.getElementById('notifList');
    try {
      const res = await fetch(NOTIF_API, { headers: { 'Authorization': `Bearer ${token}` } });
      const notifs = await res.json();
      if (!Array.isArray(notifs) || !notifs.length) { listEl.innerHTML = '<div class="notif-empty">Không có thông báo nào</div>'; return; }
      listEl.innerHTML = notifs.slice(0, 20).map(n => `<div class="notif-item${!n.read ? ' unread' : ''}" onclick="markRead(${n.id}, this)"><div class="notif-item-title">${n.title || ''}</div><div class="notif-item-msg">${n.message || ''}</div><div class="notif-item-time">${fmtRelativeTime(n.createdAt)}</div></div>`).join('');
    } catch { listEl.innerHTML = '<div class="notif-empty">Không thể tải thông báo</div>'; }
  }
  function fmtRelativeTime(dt) {
    if (!dt) return '';
    const diff = Math.floor((Date.now() - new Date(dt)) / 1000);
    if (diff < 60) return 'Vừa xong';
    if (diff < 3600) return `${Math.floor(diff/60)} phút trước`;
    if (diff < 86400) return `${Math.floor(diff/3600)} giờ trước`;
    return new Date(dt).toLocaleDateString('vi-VN');
  }
  function toggleNotifDropdown(e) {
    e.stopPropagation(); _notifOpen = !_notifOpen;
    document.getElementById('notifDropdown').classList.toggle('open', _notifOpen);
    if (_notifOpen) loadNotifications();
  }
  async function markRead(id, el) {
    try { await fetch(`${NOTIF_API}/${id}/read`, { method: 'PATCH', headers: { 'Authorization': `Bearer ${token}` } }); el.classList.remove('unread'); loadUnreadCount(); } catch {}
  }
  async function markAllRead() {
    try { await fetch(`${NOTIF_API}/read-all`, { method: 'PATCH', headers: { 'Authorization': `Bearer ${token}` } }); document.querySelectorAll('.notif-item.unread').forEach(el => el.classList.remove('unread')); document.getElementById('notifBadge').style.display = 'none'; } catch {}
  }
  document.addEventListener('click', e => { if (_notifOpen && !document.getElementById('notifWrapper').contains(e.target)) { _notifOpen = false; document.getElementById('notifDropdown').classList.remove('open'); } });
  loadUnreadCount();
  setInterval(loadUnreadCount, 30000);
</script>
<script src="sidebar.js"></script>
</body>
</html>
